# Configuration de pi0tohomekit
# Modifiez ces valeurs selon votre matériel et vos préférences.

camera:
  width: 1280          # Largeur par défaut de la capture
  height: 720          # Hauteur par défaut de la capture
  fps: 20              # Images par seconde
  bitrate: 4000000     # Débit vidéo en bits/s (gardez <= 4 Mbit/s sur Pi Zero 2)
  rotation: 0          # Rotation de l'image : 0 ou 180 (90/270 non gérés par libcamera)
  autofocus: none      # none (focus fixe, défaut) | manual (Pi Camera v3) | continuous | auto

homekit:
  name: "Pi Camera"    # Nom affiché dans l'application Maison
  pincode: ""          # Code d'appairage XXX-XX-XXX (généré automatiquement par install.sh si vide)
  port: 51826          # Port TCP du pont HomeKit

advanced:
  profile: baseline    # Profil H.264 : baseline | main | high
  level: 4             # Niveau H.264

detection:
  mode: off            # off | motion | hybrid (motion+IA)
  sensitivity: 25      # Seuil de différence de luminance (0–100 ; plus bas = plus sensible)
  confidence: 0.5      # Score minimum TFLite pour valider une détection de personne (0–1)
  cooldown: 15         # Secondes avant remise à zéro du capteur Motion après une détection
  interval: 3          # Secondes entre deux snapshots de détection
