# Configuration de pi0tohomekit
# Modifiez ces valeurs selon votre matériel et vos préférences.

camera:
  width: 1920          # Largeur max du stream annoncée à HomeKit
  height: 1080         # Hauteur max du stream annoncée à HomeKit
  fps: 30              # Images par seconde
  bitrate: 6000000     # Débit vidéo en bits/s
  rotation: 0          # Rotation de l'image : 0 ou 180 (90/270 non gérés par libcamera)
  autofocus: none      # none (focus fixe, défaut) | manual (Pi Camera v3) | continuous | auto
  awb: auto            # Balance des blancs : auto | incandescent | tungsten | fluorescent | indoor | daylight | cloudy

homekit:
  name: "Pi Camera"    # Nom affiché dans l'application Maison
  pincode: ""          # Code d'appairage XXX-XX-XXX (généré automatiquement par install.sh si vide)
  port: 51826          # Port TCP du pont HomeKit

advanced:
  profile: baseline    # Profil H.264 : baseline | main | high
  level: 4             # Niveau H.264
